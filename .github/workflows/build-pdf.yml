name: Build PDF brief

on:
  push:
    branches: [main]
    paths:
      - 'docs/index.html'
      - 'docs/assets/**'
      - 'scripts/generate-pdf.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pdf
  cancel-in-progress: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip pdf]')"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (with bundled Chromium)
        run: npm ci --no-audit --no-fund

      - name: Generate PDF
        run: npm run build:pdf

      - name: Commit PDF if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/assets/code-apps-foundations.pdf 2>/dev/null; then
            echo "No PDF changes — skipping commit."
            exit 0
          fi
          git add docs/assets/code-apps-foundations.pdf
          git commit -m "chore(pdf): regenerate code-apps-foundations.pdf [skip pdf]"
          git push
