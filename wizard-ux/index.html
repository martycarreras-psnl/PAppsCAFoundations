<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>WizardUX — Power Apps Code App Setup</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0b0a10;
        color: #e8e8ec;
        overflow: hidden;
      }
      /* Loader shown until React mounts */
      #boot {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #2a1840 0%, #0b0a10 70%);
      }
      #boot .ring {
        width: 48px; height: 48px;
        border: 3px solid #742774;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"><div id="boot"><div class="ring"></div></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
